<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Tienda | Jhonkarly ALVAREZ</title>
  <meta name="description" content="Tienda oficial de Jhonkarly ALVAREZ. Próximamente." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; background: #000; }
body { background-color: #000; color: #FFF; font-family: 'Barlow', sans-serif; font-weight: 400; line-height: 1.7; -webkit-font-smoothing: antialiased; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }
img { display: block; max-width: 100%; }
a { color: inherit; text-decoration: none; }
ul { list-style: none; }

:root {
  --c-black: #000000; --c-white: #FFFFFF;
  --c-g900: #111111; --c-g800: #1A1A1A; --c-g700: #2A2A2A;
  --c-g300: #BFBFBF; --c-g100: #E6E6E6;
  --f-display: 'Bebas Neue', sans-serif;
  --f-body: 'Barlow', sans-serif;
  --container: 1200px;
  --px: clamp(24px, 6vw, 80px);
  --t: 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}

h1,h2,h3,h4 { font-family: var(--f-display); text-transform: uppercase; letter-spacing: 0.02em; line-height: 0.93; color: var(--c-white); }
p { font-family: var(--f-body); font-weight: 300; color: var(--c-g300); }
strong { font-weight: 600; color: var(--c-white); }

/* ── HEADER ── */
.site-header { position: fixed; top: 0; left: 0; width: 100%; z-index: 100; height: 68px; display: flex; align-items: center; justify-content: space-between; padding: 0 var(--px); background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--c-g700); }
.site-header__logo { font-family: var(--f-display); font-size: clamp(0.95rem,1.6vw,1.25rem); letter-spacing: 0.22em; color: var(--c-white); transition: color var(--t); flex-shrink: 0; }
.site-header__logo:hover { color: var(--c-g300); }
.site-nav { display: flex; gap: clamp(24px,3.5vw,52px); align-items: center; }
.site-nav a { font-family: var(--f-body); font-size: 0.7rem; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--c-g300); position: relative; transition: color var(--t); white-space: nowrap; }
.site-nav a::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 1px; background: var(--c-white); transition: width var(--t); }
.site-nav a:hover, .site-nav a[aria-current="page"] { color: var(--c-white); }
.site-nav a:hover::after, .site-nav a[aria-current="page"]::after { width: 100%; }

/* ── MAIN ── */
main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 68px var(--px) clamp(60px,8vw,100px); min-height: calc(100vh - 68px); }

.coming-soon {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  padding: 40px 0;
}
.coming-soon__label {
  font-family: var(--f-body);
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.42em;
  text-transform: uppercase;
  color: var(--c-g300);
}
.coming-soon__title {
  font-family: var(--f-display);
  font-size: clamp(2.8rem, 8vw, 6rem);
  line-height: 1;
  color: var(--c-white);
  letter-spacing: 0.04em;
}
.coming-soon__sub {
  font-size: clamp(0.82rem, 1.1vw, 0.95rem);
  color: var(--c-g300);
  max-width: 380px;
  line-height: 1.9;
}
.coming-soon__divider {
  width: 40px;
  height: 1px;
  background: var(--c-g700);
}
.coming-soon__back {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: var(--f-body);
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--c-g300);
  transition: color var(--t);
  margin-top: 4px;
}
.coming-soon__back::before { content: '←'; transition: transform var(--t); }
.coming-soon__back:hover { color: var(--c-white); }
.coming-soon__back:hover::before { transform: translateX(-4px); }

/* ── FOOTER ── */
.site-footer { background: var(--c-g900); border-top: 1px solid var(--c-g700); padding: clamp(60px,8vw,100px) var(--px) 0; }
.site-footer__grid { max-width: var(--container); margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: clamp(32px,5vw,64px); padding-bottom: clamp(48px,6vw,80px); border-bottom: 1px solid var(--c-g700); }
.footer-brand__name { font-family: var(--f-display); font-size: clamp(1rem,1.8vw,1.3rem); letter-spacing: 0.18em; color: var(--c-white); display: block; margin-bottom: 16px; transition: color var(--t); }
.footer-brand__name:hover { color: var(--c-g300); }
.footer-brand__desc { font-size: 0.82rem; font-weight: 300; line-height: 1.75; color: var(--c-g300); max-width: 300px; }
.footer-col__title { font-family: var(--f-body); font-size: 0.65rem; font-weight: 600; letter-spacing: 0.32em; text-transform: uppercase; color: var(--c-white); margin-bottom: 20px; display: block; }
.footer-nav-list { display: flex; flex-direction: column; gap: 10px; }
.footer-nav-list li a, .footer-nav-list a { font-size: 0.83rem; color: var(--c-g300); transition: color var(--t); }
.footer-nav-list li a:hover, .footer-nav-list a:hover { color: var(--c-white); }
.footer-socials { display: grid; grid-template-columns: repeat(2, 44px); gap: 8px; }
.footer-social-link { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--c-g700); color: var(--c-g300); transition: border-color var(--t), color var(--t), background var(--t); }
.footer-social-link:hover { border-color: var(--c-g300); color: var(--c-white); background: var(--c-g800); }
.footer-social-link svg { width: 18px; height: 18px; }
.site-footer__bottom { max-width: var(--container); margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; padding: 24px 0 clamp(32px,4vw,48px); }
.footer-copy { font-size: 0.75rem; color: var(--c-white); letter-spacing: 0.04em; }
.footer-legal { display: flex; gap: 24px; }
.footer-legal a { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--c-g700); transition: color var(--t); }
.footer-legal a:hover { color: var(--c-white); }

@media (max-width: 1024px) {
  .site-footer__grid { grid-template-columns: 1fr 1fr; }
  .footer-brand { grid-column: span 2; }
}
@media (max-width: 768px) {
  .site-nav { display: none; }
  .site-footer__grid { grid-template-columns: 1fr; }
  .footer-brand { grid-column: span 1; }
  .site-footer__bottom { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>

<header class="site-header" role="banner">
  <a href="/" class="site-header__logo" aria-label="Jhonkarly ALVAREZ — Inicio" target="_parent">
    JHONKARLY ALVAREZ
  </a>
  <nav class="site-nav" aria-label="Navegación principal">
    <a href="/" target="_parent">Inicio</a>
    <a href="/tienda" aria-current="page" target="_parent">Tienda</a>
    <a href="/prensa" target="_parent">Prensa</a>
    <a href="/sobre-mi" target="_parent">Sobre mí</a>
    <a href="/trayectoria" target="_parent">Trayectoria</a>
    <a href="/login" target="_parent">Inicio de sesión</a>
  </nav>
</header>

<main id="main-content">
  <div class="coming-soon">
    <span class="coming-soon__label">Tienda oficial</span>
    <h1 class="coming-soon__title">Próxima<br>mente</h1>
    <div class="coming-soon__divider"></div>
    <p class="coming-soon__sub">Estamos preparando algo. Vuelve pronto.</p>
    <a href="/" class="coming-soon__back" target="_parent">Volver al inicio</a>
  </div>
</main>

</body>
</html>
